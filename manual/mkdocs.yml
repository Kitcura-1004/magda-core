site_name: MAGDA Manual
site_description: User manual for MAGDA — a free, open-source digital audio workstation
site_url: https://Conceptual-Machines.github.io/magda-core/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  logo: assets/images/magda-lisa.svg
  favicon: assets/images/magda-lisa.svg
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/Conceptual-Machines/magda-core
repo_name: magda-core

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - First Session: getting-started/first-session.md
  - Interface Layout:
      - Overview: interface/overview.md
      - Menus: interface/menus.md
      - Preferences: interface/preferences.md
      - Audio Settings: interface/audio-settings.md
      - Plugin Settings: interface/plugin-settings.md
  - Tracks: tracks.md
  - Clips: clips.md
  - FX Chain & Racks: fx-chain.md
  - Arrangement View: arrangement-view.md
  - Session View: session-view.md
  - Mixer View: mixer-view.md
  - Panels:
      - Inspector: panels/inspector.md
      - Plugin & Media Browser: panels/browsers.md
      - AI Assistant: panels/ai-assistant.md
      - Editors: panels/editors.md
      - Chord Panel: panels/chord-panel.md
  - Devices:
      - Built-in Devices: devices/built-in.md
      - 4OSC Synth: devices/4osc.md
      - Chord Engine: devices/chord-engine.md
      - Drum Grid: devices/drum-grid.md
      - Sampler: devices/sampler.md
  - Modulation:
      - Overview: modulation/overview.md
      - Modulators: modulation/modulators.md
      - Macros: modulation/macros.md
      - Linking Parameters: modulation/linking.md
  - Transport: transport.md
  - Reference:
      - DSL Reference: reference/dsl.md
      - Keyboard Shortcuts: reference/keyboard-shortcuts.md
      - File Formats: reference/file-formats.md
      - Troubleshooting: reference/troubleshooting.md

extra:
  homepage: https://magda.land
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Conceptual-Machines/magda-core
    - icon: fontawesome/solid/globe
      link: https://magda.land
      name: MAGDA Website

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - attr_list
  - md_in_html
  - toc:
      permalink: true
