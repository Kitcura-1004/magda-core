<svg width="720" height="300" viewBox="0 0 720 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; }
  </style>

  <!-- Background -->
  <rect x="10" y="10" width="700" height="280" rx="8" fill="#1e1e22" stroke="#3a3a45" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" fill="#aabbcc" font-size="14" font-weight="600">Cycles Parameter</text>

  <!-- Row 1: Cycles = 1 -->
  <text x="50" y="76" fill="#aabbcc" font-size="11" font-weight="600">Cycles = 1</text>
  <text x="50" y="90" fill="#666" font-size="9">Single curve across span</text>

  <!-- Curve -->
  <rect x="160" y="60" width="520" height="40" rx="4" fill="#252530"/>
  <path d="M 160 98 Q 220 62, 680 60" stroke="#5588aa" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Ticks -->
  <line x1="160" y1="104" x2="160" y2="112" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="195" y1="104" x2="195" y2="112" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="240" y1="104" x2="240" y2="112" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="300" y1="104" x2="300" y2="112" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="380" y1="104" x2="380" y2="112" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="478" y1="104" x2="478" y2="112" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="580" y1="104" x2="580" y2="112" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="680" y1="104" x2="680" y2="112" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Row 2: Cycles = 2 -->
  <text x="50" y="152" fill="#aabbcc" font-size="11" font-weight="600">Cycles = 2</text>
  <text x="50" y="166" fill="#666" font-size="9">Curve repeats twice</text>

  <rect x="160" y="136" width="520" height="40" rx="4" fill="#252530"/>
  <!-- Two curves -->
  <path d="M 160 174 Q 190 138, 420 136" stroke="#5588aa" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 420 174 Q 450 138, 680 136" stroke="#5588aa" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Divider -->
  <line x1="420" y1="136" x2="420" y2="176" stroke="#3a3a45" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Ticks -->
  <line x1="160" y1="180" x2="160" y2="188" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="180" y1="180" x2="180" y2="188" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="210" y1="180" x2="210" y2="188" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="260" y1="180" x2="260" y2="188" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="330" y1="180" x2="330" y2="188" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="420" y1="180" x2="420" y2="188" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="440" y1="180" x2="440" y2="188" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="470" y1="180" x2="470" y2="188" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="520" y1="180" x2="520" y2="188" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="590" y1="180" x2="590" y2="188" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="680" y1="180" x2="680" y2="188" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Row 3: Cycles = 4 -->
  <text x="50" y="228" fill="#aabbcc" font-size="11" font-weight="600">Cycles = 4</text>
  <text x="50" y="242" fill="#666" font-size="9">Curve repeats four times</text>

  <rect x="160" y="212" width="520" height="40" rx="4" fill="#252530"/>
  <!-- Four curves -->
  <path d="M 160 250 Q 175 214, 290 212" stroke="#5588aa" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 290 250 Q 305 214, 420 212" stroke="#5588aa" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 420 250 Q 435 214, 550 212" stroke="#5588aa" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 550 250 Q 565 214, 680 212" stroke="#5588aa" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Dividers -->
  <line x1="290" y1="212" x2="290" y2="252" stroke="#3a3a45" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="420" y1="212" x2="420" y2="252" stroke="#3a3a45" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="550" y1="212" x2="550" y2="252" stroke="#3a3a45" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Ticks -->
  <line x1="160" y1="256" x2="160" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="175" y1="256" x2="175" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="200" y1="256" x2="200" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="240" y1="256" x2="240" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="290" y1="256" x2="290" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="305" y1="256" x2="305" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="330" y1="256" x2="330" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="370" y1="256" x2="370" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="420" y1="256" x2="420" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="435" y1="256" x2="435" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="460" y1="256" x2="460" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="500" y1="256" x2="500" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="550" y1="256" x2="550" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="565" y1="256" x2="565" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="590" y1="256" x2="590" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="630" y1="256" x2="630" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="680" y1="256" x2="680" y2="264" stroke="#5588aa" stroke-width="1.5" stroke-linecap="round"/>
</svg>
